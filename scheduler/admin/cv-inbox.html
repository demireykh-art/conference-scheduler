<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/asls-logo.svg">
    <title>CV 제출함 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">CV 제출함</h1>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">연자가 제출 링크로 보낸 정보(이름·소속·CV·사진)입니다. <b>승인</b>하면 해당 연자 정보에 자동 반영됩니다. (연자/사회자 관리의 ✉ CV 요청으로 링크를 보냅니다)</div>
                </div>
                <div id="cvNotice" class="card empty-state" style="display:none"></div>
                <div id="cvArea" style="display:none">
                    <div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:10px">대기 중 <b id="cvPendingCount">0</b>건</div>
                    <div id="cvList" class="cvinbox-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/cv-inbox.js"></script>
</body>
</html>
