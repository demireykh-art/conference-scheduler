<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/asls-logo.svg">
    <title>사용자 관리 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">사용자 관리</h1>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">Google 계정으로 로그인한 사용자를 <b>승인</b>하면 편집 권한이 부여됩니다. (최고관리자: demire.ykh@gmail.com)</div>
                </div>

                <div id="usersNotice" class="card empty-state" style="display:none"></div>

                <div id="usersArea" style="display:none">
                    <!-- 사용자 추가(사전 승인) -->
                    <div class="card" style="padding:16px 18px;margin-bottom:16px">
                        <div style="font-weight:700;margin-bottom:4px">＋ 사용자 추가 (이메일 사전 승인)</div>
                        <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px">
                            추가할 사람의 <b>Google 계정 이메일</b>과 역할을 등록해 두면, 그 사람이 처음 로그인하는 즉시 <b>승인대기 없이</b> 바로 해당 권한으로 들어옵니다.
                        </div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                            <input type="email" id="preEmail" placeholder="예: someone@gmail.com" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem;width:260px">
                            <select id="preRole" style="padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.85rem">
                                <option value="editor">편집자</option>
                                <option value="admin">관리자</option>
                            </select>
                            <button class="btn btn-primary" onclick="addPreApproval()">사전 승인 추가</button>
                        </div>
                        <div id="preList" style="margin-top:12px"></div>
                    </div>

                    <div class="toolbar-row">
                        <div>
                            <input type="text" id="userSearch" placeholder="🔍 이름/이메일 검색" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem;width:260px">
                            <span style="margin-left:10px;color:var(--text-dim);font-size:0.85rem">
                                총 <span id="userCount">0</span>명 · 승인대기 <span id="pendingCount" style="color:var(--danger);font-weight:600">0</span>명
                            </span>
                        </div>
                    </div>
                    <div class="card table-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>사용자</th>
                                    <th>이메일</th>
                                    <th style="text-align:center">역할</th>
                                    <th>마지막 로그인</th>
                                    <th style="text-align:right">관리</th>
                                </tr>
                            </thead>
                            <tbody id="userBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
