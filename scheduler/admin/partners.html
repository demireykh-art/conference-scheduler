<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파트너사 관리 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">파트너사 관리</h1>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">파트너사와 제품을 미리 등록해 두면, 강의 입력 시 목록에서 선택할 수 있어 오타·중복을 방지합니다.</div>
                </div>
                <div class="toolbar-row">
                    <div>
                        <input type="text" id="ptnSearch" placeholder="🔍 파트너사/제품 검색" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem;width:260px">
                        <span style="margin-left:10px;color:var(--text-dim);font-size:0.85rem">총 <span id="ptnCount">0</span>개사</span>
                        <span id="placedConf" style="margin-left:10px;color:var(--text-dim);font-size:0.82rem"></span>
                    </div>
                    <button class="btn btn-primary" onclick="openPartnerModal()">+ 파트너사 등록</button>
                </div>
                <div class="card table-card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>파트너사 (국문)</th>
                                <th>파트너사 (영문)</th>
                                <th>제품</th>
                                <th>등급 혜택 (미배치/배치)</th>
                                <th style="text-align:right">관리</th>
                            </tr>
                        </thead>
                        <tbody id="ptnBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 파트너사 등록/수정 모달 -->
    <div class="modal-overlay" id="ptnModal">
        <div class="modal wide">
            <h3 id="ptnModalTitle">파트너사 등록</h3>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>파트너사 (국문) *</label>
                    <input type="text" id="ptnNameKo" placeholder="예: (주)에이비씨">
                </div>
                <div class="modal-field">
                    <label>파트너사 (영문)</label>
                    <input type="text" id="ptnNameEn" placeholder="예: ABC Co., Ltd.">
                </div>
            </div>
            <div class="modal-field">
                <label>부스 등급</label>
                <select id="ptnGrade"></select>
                <div style="font-size:0.72rem;color:var(--text-dim)">등급을 선택하면 그 등급의 강의 혜택 수가 파트너사 목록에 태그로 표시됩니다.</div>
            </div>
            <div class="modal-field">
                <label>제품 목록 (선택)</label>
                <div id="ptnProducts"></div>
                <button type="button" class="btn btn-sm" onclick="addProductRow()" style="align-self:flex-start;margin-top:4px">+ 제품 추가</button>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closePartnerModal()">취소</button>
                <button class="btn btn-primary" onclick="savePartner()">저장</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/partners.js"></script>
</body>
</html>
