<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/asls-logo.svg">
    <title>ASLS 연자 정보 · CV 제출</title>
    <meta property="og:title" content="ASLS 연자 정보 · CV 제출">
    <meta property="og:description" content="연자 성함·소속·약력(CV)과 사진을 등록하는 페이지입니다.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://demireykh-art.github.io/conference-scheduler/scheduler/admin/assets/asls-logo.svg">
    <meta name="theme-color" content="#6E2B7B">
    <meta name="twitter:card" content="summary">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        body { background: #f1f3f5; }
        .cv-wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 60px; }
        .cv-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; box-shadow: var(--shadow-md); }
        .cv-title { font-size: 1.25rem; font-weight: 800; margin: 0 0 4px; }
        .cv-sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 18px; }
        .cv-field { margin-bottom: 14px; }
        .cv-field label { display: block; font-size: 0.84rem; font-weight: 700; margin-bottom: 6px; }
        .cv-field input, .cv-field textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 9px; font-size: 0.95rem; }
        .cv-field input:focus, .cv-field textarea:focus { border-color: var(--primary); outline: none; }
        .cv-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 460px) { .cv-grid2 { grid-template-columns: 1fr; } }
        .cv-photo-row { display: flex; align-items: center; gap: 16px; }
        .cv-photo { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: #eef0f3; display: grid; place-items: center; color: var(--text-dim); font-size: 0.8rem; }
        .cv-submit-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; background: var(--primary); color: #fff; cursor: pointer; }
        .cv-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .cv-done { text-align: center; padding: 30px 10px; }
        .cv-done .ico { font-size: 3rem; }
        .cv-msg { font-size: 0.82rem; margin-top: 8px; min-height: 18px; }
        .cv-err { color: var(--danger); }
        .cv-ok { color: var(--success); }
    </style>
</head>
<body>
    <div class="cv-wrap">
        <div class="cv-card" id="cvCard">
            <h1 class="cv-title" id="cvTitle">연자 정보 · CV 제출</h1>
            <div class="cv-sub" id="cvSub">잠시만요…</div>

            <div id="cvForm" style="display:none">
                <div class="cv-field">
                    <label>사진 (프로필/증명)</label>
                    <div class="cv-photo-row">
                        <img id="cvPhotoImg" class="cv-photo" style="display:none" alt="">
                        <div id="cvPhotoEmpty" class="cv-photo">사진</div>
                        <div>
                            <input type="file" id="cvPhotoFile" accept="image/*" style="display:none">
                            <button type="button" class="btn btn-sm" onclick="document.getElementById('cvPhotoFile').click()">🖼️ 사진 선택</button>
                            <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">자동으로 축소되어 저장됩니다.</div>
                        </div>
                    </div>
                </div>
                <div class="cv-grid2">
                    <div class="cv-field"><label>이름 (국문) *</label><input type="text" id="cvNameKo"></div>
                    <div class="cv-field"><label>이름 (영문)</label><input type="text" id="cvNameEn"></div>
                </div>
                <div class="cv-grid2">
                    <div class="cv-field"><label>소속 (국문)</label><input type="text" id="cvAffKo" placeholder="예: OO의원"></div>
                    <div class="cv-field"><label>소속 (영문)</label><input type="text" id="cvAffEn" placeholder="예: OO Clinic"></div>
                </div>
                <div class="cv-field"><label>이메일</label><input type="email" id="cvEmail" placeholder="예: me@gmail.com"></div>
                <div class="cv-field"><label>약력 / CV</label><textarea id="cvText" rows="6" placeholder="학력·경력·주요 이력 등"></textarea></div>
                <button class="cv-submit-btn" id="cvSubmitBtn" onclick="submitCV()">제출하기</button>
                <div class="cv-msg" id="cvMsg"></div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/cv-submit.js"></script>
</body>
</html>
