<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/asls-logo.svg">
    <title>부스 등급별 혜택 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">부스 등급별 혜택</h1>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-sm" onclick="addColumn()">+ 혜택 열</button>
                    <button class="btn btn-sm" onclick="addGrade()">+ 등급 행</button>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">행사별 부스 등급 혜택 표입니다. 위에서 행사를 선택하고 셀을 클릭해 바로 수정하세요. (숫자는 해당 행사 파트너사 등급 혜택 태그로 연동됩니다)</div>
                </div>

                <div class="field" style="max-width:420px;margin-bottom:16px">
                    <label>행사 선택</label>
                    <select id="boothConfSelect" onchange="onBoothConfChange()" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem"></select>
                </div>

                <div id="boothArea" style="display:none">
                    <div class="card table-card">
                        <table class="data-table booth-table" id="boothTable"></table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/booth-benefits.js"></script>
</body>
</html>
