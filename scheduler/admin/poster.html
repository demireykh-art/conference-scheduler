<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/asls-logo.png">
    <title>연자 포스터 생성 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">연자 포스터 생성</h1>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-primary" onclick="savePoster()">💾 템플릿·배치 저장</button>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">행사별 포스터 배경을 올리고, 사진·이름·문구 위치를 드래그로 맞춘 뒤 저장하면, 그 행사 연자 전원의 홍보 포스터를 한 번에 만들어 다운로드/공유할 수 있습니다.</div>
                </div>

                <div class="field" style="max-width:460px;margin-bottom:14px">
                    <label>행사 선택</label>
                    <select id="posConfSelect" onchange="onPosConfChange()" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem"></select>
                </div>

                <div class="poster-layout">
                    <!-- 편집기 -->
                    <div class="card poster-editor">
                        <div class="pe-head">
                            <b>1. 포스터 배경 · 배치 편집</b>
                            <label class="btn btn-sm">🖼️ 배경 이미지 선택
                                <input type="file" id="posTplFile" accept="image/*" style="display:none">
                            </label>
                        </div>
                        <div id="posStageWrap" class="pe-stage-wrap">
                            <div id="posStage" class="pe-stage">
                                <div class="pe-empty" id="posEmpty">배경 이미지를 올려주세요.<br><span>세로형(예: 1080×1920) 권장</span></div>
                            </div>
                        </div>
                        <!-- 선택 요소 설정 -->
                        <div id="posCtrls" class="pe-ctrls" style="display:none">
                            <div class="pe-ctrl-row">
                                <span class="pe-ctrl-label">선택 요소</span>
                                <select id="posSel" onchange="posSelectFromDropdown()">
                                    <option value="label">문구 (I'M SPEAKING AT)</option>
                                    <option value="event">행사 이름</option>
                                    <option value="name">연자 이름 (국문)</option>
                                    <option value="nameEn">연자 이름 (영문)</option>
                                    <option value="photo">연자 사진(원형)</option>
                                </select>
                            </div>
                            <div id="posTextCtrls">
                                <div class="pe-ctrl-row" id="posTextRow">
                                    <span class="pe-ctrl-label">문구</span>
                                    <input type="text" id="posText" oninput="onPosTextEdit()" style="flex:1">
                                </div>
                                <div class="pe-ctrl-row">
                                    <span class="pe-ctrl-label">크기</span>
                                    <input type="range" id="posSize" min="1" max="16" step="0.2" oninput="onPosSize()">
                                    <span class="pe-ctrl-label">글꼴</span>
                                    <select id="posFont" onchange="onPosFont()">
                                        <option value="Georgia, 'Nanum Myeongjo', serif">명조(Serif)</option>
                                        <option value="Arial, 'Malgun Gothic', sans-serif">고딕(Sans)</option>
                                        <option value="'Times New Roman', serif">Times</option>
                                    </select>
                                    <label class="check-inline"><input type="checkbox" id="posBold" onchange="onPosBold()"> 굵게</label>
                                    <span class="pe-ctrl-label">색</span>
                                    <input type="color" id="posColor" oninput="onPosColor()">
                                </div>
                            </div>
                            <div id="posPhotoCtrls" style="display:none">
                                <div class="pe-ctrl-row">
                                    <span class="pe-ctrl-label">사진 크기</span>
                                    <input type="range" id="posPhotoSize" min="8" max="60" step="0.5" oninput="onPosPhotoSize()">
                                    <label class="check-inline"><input type="checkbox" id="posRing" onchange="onPosRing()"> 흰 테두리</label>
                                    <span class="pe-ctrl-label">테두리색</span>
                                    <input type="color" id="posRingColor" value="#ffffff" oninput="onPosRing()">
                                </div>
                            </div>
                            <div style="font-size:0.76rem;color:var(--text-dim);margin-top:4px">요소를 클릭해 선택하고 드래그로 위치를 옮기세요. 문구/행사·연자 이름 위치와 사진 위치를 자유롭게 배치할 수 있습니다.</div>
                        </div>
                    </div>

                    <!-- 결과 -->
                    <div class="card poster-result">
                        <div class="pe-head">
                            <b>2. 연자 포스터 생성</b>
                            <div style="display:flex;gap:6px">
                                <button class="btn btn-sm" onclick="generateAll()">🔄 생성/새로고침</button>
                                <button class="btn btn-sm btn-success" onclick="downloadAllZip()">⬇️ 전체 ZIP</button>
                            </div>
                        </div>
                        <div id="posCount" style="font-size:0.82rem;color:var(--text-dim);margin:2px 0 10px"></div>
                        <div id="posGrid" class="poster-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/poster.js"></script>
</body>
</html>
