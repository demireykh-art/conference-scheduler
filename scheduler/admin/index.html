<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사 개설/관리 · KAFC 행사 관리</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 사이드바 (JS 주입) -->
        <div id="sidebarMount"></div>

        <!-- 메인 -->
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">행사 개설/관리</h1>
                </div>
            </div>

            <div class="main-body">
                <!-- 안내 배너 -->
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">학술대회·행사 운영 안내</div>
                    <div class="chev">⌄</div>
                </div>

                <!-- 탭 + 신규등록 -->
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
                    <div class="tab-row" style="border-bottom:none;margin-bottom:0" id="confTabs">
                        <button class="tab active" data-tab="public">공개 (<span id="cntPublic">0</span>)</button>
                        <button class="tab" data-tab="private">비공개 (<span id="cntPrivate">0</span>)</button>
                    </div>
                    <button class="btn btn-primary" onclick="openConferenceModal()">+ 신규 행사 등록</button>
                </div>
                <div style="border-bottom:1px solid var(--border);margin:0 0 18px"></div>

                <!-- 목록 -->
                <div id="confList"></div>
            </div>
        </main>
    </div>

    <!-- 행사 설정 모달 -->
    <div class="modal-overlay" id="confModal">
        <div class="modal wide">
            <h3 id="confModalTitle">신규 행사 등록</h3>
            <div class="modal-field">
                <label>행사명 *</label>
                <input type="text" id="cfTitle" placeholder="예: 2026 ASLS 추계학술대회">
            </div>
            <div class="modal-field">
                <label>영문명 (선택)</label>
                <input type="text" id="cfTitleEn" placeholder="2026 ASLS Autumn Congress">
            </div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>시작일 *</label>
                    <input type="date" id="cfStart">
                </div>
                <div class="modal-field">
                    <label>종료일</label>
                    <input type="date" id="cfEnd">
                </div>
            </div>
            <div class="modal-field">
                <label>장소</label>
                <input type="text" id="cfLocation" placeholder="코엑스 (서울 강남구 삼성동)">
            </div>
            <div class="modal-field">
                <label>포스터 이미지 URL (선택)</label>
                <input type="text" id="cfPoster" placeholder="https://...">
            </div>
            <div class="modal-field">
                <label class="check-inline">
                    <input type="checkbox" id="cfPublic" checked> 공개 (사용자 화면에 노출)
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeConferenceModal()">취소</button>
                <button class="btn btn-primary" onclick="saveConference()">저장</button>
            </div>
        </div>
    </div>

    <!-- 앱 스크립트 -->
    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/conferences.js"></script>
</body>
</html>
