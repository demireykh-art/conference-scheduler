<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/asls-logo.png">
    <title>행사 개설/관리 · ASLS 행사 관리</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 사이드바 (JS 주입) -->
        <div id="sidebarMount"></div>

        <!-- 메인 -->
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">행사 개설/관리</h1>
                </div>
            </div>

            <div class="main-body">
                <!-- 안내 배너 -->
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">학술대회·행사 운영 안내</div>
                    <div class="chev">⌄</div>
                </div>

                <!-- 탭 + 신규등록 -->
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
                    <div class="tab-row" style="border-bottom:none;margin-bottom:0" id="confTabs">
                        <button class="tab active" data-tab="public">공개 (<span id="cntPublic">0</span>)</button>
                        <button class="tab" data-tab="private">비공개 (<span id="cntPrivate">0</span>)</button>
                    </div>
                    <button class="btn btn-primary" onclick="openConferenceModal()">+ 신규 행사 등록</button>
                </div>
                <div style="border-bottom:1px solid var(--border);margin:0 0 18px"></div>

                <!-- 목록 -->
                <div id="confList"></div>
            </div>
        </main>
    </div>

    <!-- 행사 설정 모달 -->
    <div class="modal-overlay" id="confModal">
        <div class="modal wide">
            <h3 id="confModalTitle">신규 행사 등록</h3>
            <div class="modal-field">
                <label>행사명 *</label>
                <input type="text" id="cfTitle" placeholder="예: 2026 ASLS 추계학술대회">
            </div>
            <div class="modal-field">
                <label>영문명 (선택)</label>
                <input type="text" id="cfTitleEn" placeholder="2026 ASLS Autumn Congress">
            </div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>시작일 *</label>
                    <input type="date" id="cfStart">
                </div>
                <div class="modal-field">
                    <label>종료일</label>
                    <input type="date" id="cfEnd">
                </div>
            </div>
            <div class="modal-field">
                <label>장소</label>
                <input type="text" id="cfLocation" placeholder="코엑스 (서울 강남구 삼성동)">
            </div>
            <div class="modal-field">
                <label>포스터 이미지 (선택)</label>
                <div style="display:flex;gap:12px;align-items:flex-start">
                    <img id="cfPosterPreview" class="poster-preview" style="display:none" alt="포스터 미리보기">
                    <div id="cfPosterEmpty" class="poster-preview poster-empty">미리보기</div>
                    <div style="display:flex;flex-direction:column;gap:6px;flex:1">
                        <input type="file" id="cfPosterFile" accept="image/*" style="display:none">
                        <button type="button" class="btn btn-sm" onclick="document.getElementById('cfPosterFile').click()">🖼️ 이미지 파일 선택</button>
                        <button type="button" class="btn btn-sm" id="cfPosterDownload" onclick="downloadCurrentPoster()" style="display:none">⬇ 다운로드</button>
                        <button type="button" class="btn btn-sm btn-danger-ghost" id="cfPosterClear" onclick="clearPoster()" style="display:none">✕ 제거</button>
                        <div style="font-size:0.72rem;color:var(--text-dim);line-height:1.4">JPG·PNG 업로드 시 가로 1000px로 자동 축소 저장됩니다.</div>
                    </div>
                </div>
                <input type="text" id="cfPoster" placeholder="또는 이미지 URL 직접 입력 (https://...)" style="margin-top:8px">
            </div>

            <div style="border-top:1px solid var(--border);margin:10px 0 14px"></div>
            <div style="font-size:0.92rem;font-weight:700;margin-bottom:4px">📄 원고·CV 접수 설정</div>
            <div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:12px">연자 CV·초록 요청 메일과 제출 포털에 자동으로 사용됩니다. (장소·일자는 위 정보 사용)</div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>접수 마감일</label>
                    <input type="date" id="cfDeadline">
                </div>
                <div class="modal-field">
                    <label>리마인드 시점 (마감 D-일, 쉼표 구분)</label>
                    <input type="text" id="cfReminderDays" placeholder="14, 7, 3, 1">
                </div>
            </div>
            <div class="modal-field">
                <label>프로그램 바로가기 링크 (선택)</label>
                <input type="text" id="cfProgramUrl" placeholder="https://...">
            </div>
            <div class="modal-field">
                <label>강의원고(워드·PPT) 외부 업로드 링크</label>
                <input type="text" id="cfManuscriptUrl" placeholder="예: 드롭박스·구글드라이브 파일요청 https://www.dropbox.com/request/...">
                <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">초록은 제출 포털에서 직접 입력받고, 실제 워드/PPT 파일은 이 링크로 접수합니다.</div>
            </div>
            <div class="modal-field">
                <label>접수형식 안내 (선택)</label>
                <textarea id="cfFormatNote" rows="3" placeholder="예: 워드파일 2페이지 이내 (PPT 불가). 단, 유료강좌방은 PPT로 제출, 분량 제한 없음."></textarea>
            </div>
            <div class="modal-field">
                <label>문의처 (선택)</label>
                <textarea id="cfInquiry" rows="2" placeholder="예: 대한미용성형레이저의학회 사무국 02-3443-1232, demire@naver.com"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn" onclick="closeConferenceModal()">취소</button>
                <button class="btn btn-primary" onclick="saveConference()">저장</button>
            </div>
        </div>
    </div>

    <!-- 앱 스크립트 -->
    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/conferences.js"></script>
</body>
</html>
