<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간표 및 프로그램 구성 · ASLS 행사 관리</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- SheetJS (엑셀 내보내기) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>

        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div>
                        <h1 class="main-title">시간표 및 프로그램 구성</h1>
                        <div id="confSwitcher" class="conf-switcher"></div>
                    </div>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-success" onclick="exportExcel()">📊 엑셀 다운로드</button>
                    <button class="btn" data-soon="1">🕘 변경 이력</button>
                </div>
            </div>

            <div class="main-body">
                <a href="index.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">‹ 행사 목록으로</a>

                <!-- 룸 탭 -->
                <div class="room-tabs" id="roomTabs"></div>

                <!-- 룸 설정 -->
                <div class="card room-settings" id="roomSettings" style="display:none"></div>

                <!-- 세션 추가 -->
                <div class="add-session-row" id="addSessionRow" style="display:none">
                    <button class="btn btn-dark" onclick="openSessionModal()">+ 세션 추가</button>
                </div>

                <!-- 세션 목록 -->
                <div id="sessions"></div>
            </div>
        </main>
    </div>

    <!-- ================= 강의 배치 모달 (풀에서 검색·선택) ================= -->
    <div class="modal-overlay" id="placeModal">
        <div class="modal wide">
            <h3 id="placeModalTitle">강의 배치</h3>
            <div class="filter-bar" style="margin-bottom:8px">
                <input type="text" id="placeSearch" placeholder="🔍 제목·연자·태그 검색" style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:0.86rem;flex:1;min-width:160px">
                <select id="placeCatFilter" style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:0.86rem"></select>
                <label class="check-inline" style="font-size:0.82rem"><input type="checkbox" id="placeHidePlaced" checked> 미배치만</label>
            </div>
            <div class="place-list" id="placeList"></div>
            <div class="modal-actions">
                <a href="lectures.html" target="_blank" id="placeManageLink" class="btn btn-sm" style="margin-right:auto">＋ 강의 관리에서 등록</a>
                <button class="btn" onclick="closePlaceModal()">닫기</button>
            </div>
        </div>
    </div>

    <!-- ================= 강의 시간 수정 모달 ================= -->
    <div class="modal-overlay" id="durModal">
        <div class="modal" style="max-width:340px">
            <h3>강의 시간 수정</h3>
            <div id="durLecTitle" style="font-size:0.9rem;color:var(--text-dim);margin-bottom:12px"></div>
            <div class="modal-field">
                <label>강의 시간 (분)</label>
                <input type="number" id="durInput" min="0" step="5" style="max-width:140px">
            </div>
            <div style="font-size:0.78rem;color:var(--text-dim)">강의 내용(제목·연자 등)은 <b>강의 관리</b>에서 수정합니다.</div>
            <div class="modal-actions">
                <button class="btn" onclick="closeDurModal()">취소</button>
                <button class="btn btn-primary" onclick="saveDuration()">저장</button>
            </div>
        </div>
    </div>

    <!-- ================= 세션 추가/수정 모달 ================= -->
    <div class="modal-overlay" id="sessionModal">
        <div class="modal" style="max-width:420px">
            <h3 id="sessionModalTitle">세션 추가</h3>
            <div class="modal-field">
                <label>세션 이름</label>
                <input type="text" id="sessionName" placeholder="예: 오전 / 점심 / 오후">
            </div>
            <div class="modal-field">
                <label>사회자 (Moderator) — 선택</label>
                <div class="ac-wrap">
                    <input type="text" id="modInput" placeholder="🔍 사회자 이름 검색 후 선택…" autocomplete="off">
                    <div class="ac-list" id="modAc"></div>
                </div>
                <div id="modChosen" class="chips" style="margin-top:8px"></div>
                <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">사회자는 세션 전체 시간 동안 배정되어 중복 체크에 포함됩니다. (해당 세션의 연자로도 있으면 제외)</div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeSessionModal()">취소</button>
                <button class="btn btn-primary" onclick="saveSession()">저장</button>
            </div>
        </div>
    </div>

    <!-- ================= 강의 이동 모달 ================= -->
    <div class="modal-overlay" id="moveModal">
        <div class="modal" style="max-width:360px">
            <h3>강의 이동</h3>
            <div class="modal-field">
                <label>이동할 세션 선택</label>
                <select id="moveTarget" style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:0.86rem"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeMoveModal()">취소</button>
                <button class="btn btn-primary" onclick="confirmMove()">이동</button>
            </div>
        </div>
    </div>

    <!-- ================= 룸 추가 모달 (날짜 필수) ================= -->
    <div class="modal-overlay" id="roomModal">
        <div class="modal" style="max-width:440px">
            <h3>룸 추가</h3>
            <div class="modal-field">
                <label>룸 이름</label>
                <input type="text" id="newRoomName" placeholder="예: 토A">
            </div>
            <div class="modal-field">
                <label>날짜 * (연자 중복 체크 기준)</label>
                <div class="day-btns" id="newRoomDayBtns"></div>
                <div style="font-size:0.78rem;color:var(--text-dim)">행사 기간의 날짜 중 하나를 반드시 선택하세요.</div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeRoomModal()">취소</button>
                <button class="btn btn-primary" onclick="saveNewRoom()">추가</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/timetable.js"></script>
</body>
</html>
