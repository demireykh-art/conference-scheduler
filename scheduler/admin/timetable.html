<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간표 및 프로그램 구성 · ASLS 행사 관리</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- SheetJS (엑셀 내보내기) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>

        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div>
                        <h1 class="main-title">시간표 및 프로그램 구성</h1>
                        <div id="confContext" style="font-size:0.82rem;color:var(--text-dim);margin-top:2px"></div>
                    </div>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-success" onclick="exportExcel()">📊 엑셀 다운로드</button>
                    <button class="btn" data-soon="1">🕘 변경 이력</button>
                </div>
            </div>

            <div class="main-body">
                <a href="index.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">‹ 행사 목록으로</a>

                <!-- 룸 탭 -->
                <div class="room-tabs" id="roomTabs"></div>

                <!-- 룸 설정 -->
                <div class="card room-settings" id="roomSettings" style="display:none"></div>

                <!-- 세션 추가 -->
                <div class="add-session-row" id="addSessionRow" style="display:none">
                    <button class="btn btn-dark" onclick="openSessionModal()">+ 세션 추가</button>
                </div>

                <!-- 세션 목록 -->
                <div id="sessions"></div>
            </div>
        </main>
    </div>

    <!-- ================= 강의 추가/수정 모달 ================= -->
    <div class="modal-overlay" id="lectureModal">
        <div class="modal wide">
            <h3 id="lecModalTitle">강의 추가</h3>
            <div class="modal-field">
                <label>강의 제목 (국문) *</label>
                <textarea id="lecTitleKo" placeholder="강의 제목 (국문)" rows="2"></textarea>
            </div>
            <div class="modal-field">
                <label>강의 제목 (영문)</label>
                <textarea id="lecTitleEn" placeholder="Lecture title (English)" rows="2"></textarea>
            </div>
            <div class="modal-field">
                <label>강의 시간 (분)</label>
                <input type="number" id="lecDuration" min="0" step="5" value="10" style="max-width:140px">
            </div>

            <div class="modal-field">
                <label>연자 (등록된 연자에서 선택)</label>
                <div class="select-add-row">
                    <select id="lecSpeakerSelect"></select>
                    <button type="button" class="btn btn-sm" onclick="addSelectedSpeaker()">+ 추가</button>
                </div>
                <div class="chips" id="lecSpeakerChips"></div>
                <div id="lecSpeakerHint"></div>
            </div>

            <div class="modal-grid2">
                <div class="modal-field">
                    <label>파트너사 (등록된 파트너사에서 선택)</label>
                    <select id="lecPartnerSelect" onchange="onPartnerChange()"></select>
                    <div id="lecPartnerHint"></div>
                </div>
                <div class="modal-field">
                    <label>제품 (선택)</label>
                    <select id="lecProductSelect"></select>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn" onclick="closeLectureModal()">취소</button>
                <button class="btn btn-primary" onclick="saveLecture()">저장</button>
            </div>
        </div>
    </div>

    <!-- ================= 세션 추가/수정 모달 ================= -->
    <div class="modal-overlay" id="sessionModal">
        <div class="modal" style="max-width:360px">
            <h3 id="sessionModalTitle">세션 추가</h3>
            <div class="modal-field">
                <label>세션 이름</label>
                <input type="text" id="sessionName" placeholder="예: 오전 / 점심 / 오후">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeSessionModal()">취소</button>
                <button class="btn btn-primary" onclick="saveSession()">저장</button>
            </div>
        </div>
    </div>

    <!-- ================= 강의 이동 모달 ================= -->
    <div class="modal-overlay" id="moveModal">
        <div class="modal" style="max-width:360px">
            <h3>강의 이동</h3>
            <div class="modal-field">
                <label>이동할 세션 선택</label>
                <select id="moveTarget" style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:0.86rem"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeMoveModal()">취소</button>
                <button class="btn btn-primary" onclick="confirmMove()">이동</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/timetable.js"></script>
</body>
</html>
