<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/asls-logo.png">
    <title>강의 관리 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1 class="main-title">강의 관리</h1>
                </div>
            </div>
            <div class="main-body">
                <div class="info-banner">
                    <div class="info-ico">i</div>
                    <div class="info-title">강의를 먼저 여기에 등록하면, 시간표에서 검색·분류필터로 골라 배치할 수 있습니다.</div>
                </div>

                <!-- 행사 선택 -->
                <div class="field" style="max-width:420px;margin-bottom:16px">
                    <label>행사 선택</label>
                    <select id="confSelect" onchange="onConfChange()" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem"></select>
                </div>

                <div id="poolArea" style="display:none">
                    <div class="filter-bar">
                        <input type="text" id="lecSearch" placeholder="🔍 제목·연자·태그 검색" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem;width:240px">
                        <select id="catFilter" onchange="renderPool()" style="padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem"></select>
                        <select id="lecSort" style="padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.86rem"></select>
                        <span class="lec-date-filter" id="lecDateFilter"></span>
                        <span style="color:var(--text-dim);font-size:0.85rem">총 <span id="lecCount">0</span>개 · 미배치 <span id="unplacedCount">0</span>개</span>
                        <button id="dupFilterBtn" class="btn btn-sm dup-filter-btn" onclick="toggleDupFilter()" title="같은 강의가 시간표 여러 곳에 배치된 강의만 보기" style="display:none">🔴 중복배치 0</button>
                        <span style="flex:1"></span>
                        <button class="btn btn-primary" onclick="openLectureModal()">+ 강의 등록</button>
                    </div>
                    <div class="card table-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>제목</th>
                                    <th>분류 / 태그</th>
                                    <th>연자</th>
                                    <th>파트너사·제품</th>
                                    <th style="text-align:center">시간</th>
                                    <th style="text-align:center">배치/중복</th>
                                    <th style="text-align:right">관리</th>
                                </tr>
                            </thead>
                            <tbody id="poolBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 강의 등록/수정 모달 -->
    <div class="modal-overlay" id="lectureModal">
        <div class="modal wide">
            <h3 id="lecModalTitle">강의 등록</h3>
            <div class="modal-field">
                <label>강의 제목 (국문) *</label>
                <textarea id="lecTitleKo" placeholder="강의 제목 (국문)" rows="2"></textarea>
            </div>
            <div class="modal-field">
                <label>강의 제목 (영문)</label>
                <textarea id="lecTitleEn" placeholder="Lecture title (English)" rows="2"></textarea>
            </div>
            <div class="modal-field">
                <label>강의 시간 (분)</label>
                <input type="number" id="lecDuration" min="1" max="60" step="1" value="20" style="max-width:140px">
                <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">1~60분, 1분 단위 (화살표 또는 직접 입력)</div>
            </div>

            <div class="modal-field">
                <label>분류 (복수 선택 가능)</label>
                <div class="select-add-row">
                    <select id="lecCatSelect"></select>
                    <button type="button" class="btn btn-sm" onclick="addCategory()">+ 추가</button>
                </div>
                <div class="chips" id="lecCatChips"></div>
            </div>

            <div class="modal-field">
                <label>태그 / 소분류 (수동 입력, Enter로 추가)</label>
                <input type="text" id="lecTagInput" placeholder="예: HA, PN, 리프팅 … 입력 후 Enter">
                <div class="chips" id="lecTagChips"></div>
            </div>

            <div class="modal-field">
                <label>강의유형 (정규/일반/요일/시간/스폰)</label>
                <select id="lecTypeSelect" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem"></select>
            </div>

            <div class="modal-field">
                <label>연자 (이름 검색 후 Enter로 추가)</label>
                <div class="ac-wrap">
                    <input type="text" id="lecSpeakerInput" placeholder="연자 이름 검색…" autocomplete="off">
                    <div class="ac-list" id="lecSpeakerAc"></div>
                </div>
                <div class="chips" id="lecSpeakerChips"></div>
                <div id="lecSpeakerHint"></div>
            </div>

            <div class="modal-grid2">
                <div class="modal-field">
                    <label>파트너사 (검색 후 Enter로 선택)</label>
                    <div class="ac-wrap">
                        <input type="text" id="lecPartnerInput" placeholder="파트너사 검색…" autocomplete="off">
                        <div class="ac-list" id="lecPartnerAc"></div>
                    </div>
                    <div class="chips" id="lecPartnerChosen"></div>
                    <div id="lecPartnerHint"></div>
                </div>
                <div class="modal-field">
                    <label>제품 (선택)</label>
                    <div style="display:flex;gap:6px;align-items:center">
                        <select id="lecProductSelect" style="flex:1"></select>
                        <button type="button" class="btn btn-sm" onclick="openNewProductModal()" title="이 파트너사에 새 제품 추가">+ 새 제품</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn" onclick="closeLectureModal()">취소</button>
                <button class="btn btn-primary" onclick="saveLecture()">저장</button>
            </div>
        </div>
    </div>

    <!-- 새 제품 등록 팝업 (파트너사 관리 제품 입력과 동일 양식 → /adminPartners 연동) -->
    <div class="modal-overlay" id="lecProdModal">
        <div class="modal" style="max-width:460px">
            <h3>새 제품 등록</h3>
            <div id="lecProdPartnerName" style="font-size:0.85rem;color:var(--text-dim);margin-bottom:10px"></div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>제품명 (국문)</label>
                    <input type="text" id="lpNameKo" placeholder="예: 스킨부스터">
                </div>
                <div class="modal-field">
                    <label>제품명 (영문)</label>
                    <input type="text" id="lpNameEn" placeholder="예: Skin Booster">
                </div>
            </div>
            <div class="modal-field">
                <label>제품 분류</label>
                <select id="lpCat"></select>
            </div>
            <div class="modal-field">
                <label>제품 설명</label>
                <input type="text" id="lpDesc" placeholder="제품 설명 (수동 입력)">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeNewProductModal()">취소</button>
                <button class="btn btn-primary" onclick="saveNewProduct()">등록 후 선택</button>
            </div>
        </div>
    </div>

    <!-- ================= 강의 이동/복제 모달 ================= -->
    <div class="modal-overlay" id="moveLecModal">
        <div class="modal" style="max-width:420px">
            <h3>강의 이동 / 복제</h3>
            <div id="moveLecTitle" style="font-size:0.9rem;color:var(--text-dim);margin-bottom:12px"></div>
            <div class="modal-field">
                <label>대상 행사</label>
                <select id="moveLecTarget" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem"></select>
            </div>
            <div style="font-size:0.74rem;color:var(--text-dim);margin-top:4px">이동: 원본을 삭제하고 대상 행사로 옮깁니다. 복제: 원본을 남기고 대상 행사에 사본을 만듭니다. (시간표에 이미 배치된 사본은 영향받지 않습니다)</div>
            <div class="modal-actions" id="moveLecBtns">
                <button class="btn" onclick="closeMoveLecModal()">취소</button>
                <button class="btn" onclick="doMoveLecture('copy')">복제(원본 유지)</button>
                <button class="btn btn-primary" onclick="doMoveLecture('move')">이동</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/lectures.js"></script>
</body>
</html>
