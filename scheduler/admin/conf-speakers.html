<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연자/사회자 관리 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div>
                        <h1 class="main-title">연자/사회자 관리</h1>
                        <div id="confName" style="font-size:0.82rem;color:var(--text-dim);margin-top:2px"></div>
                    </div>
                </div>
            </div>
            <div class="main-body">
                <a href="index.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">‹ 행사 목록으로</a>

                <div class="info-banner" style="margin-top:12px">
                    <div class="info-ico">i</div>
                    <div class="info-title">이 행사에 참여하는 연자/사회자를 선택하세요. 이름을 입력하면 등록된 연자에서 바로 찾아 추가할 수 있고, 없으면 새로 등록됩니다.</div>
                </div>

                <div class="ac-wrap" style="max-width:460px;margin-bottom:6px">
                    <input type="text" id="spkInput" placeholder="🔍 연자 이름 입력 후 선택…" autocomplete="off"
                        style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem">
                    <div class="ac-list" id="spkAc"></div>
                </div>
                <div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:14px">참여 연자/사회자 <span id="spkCount">0</span>명</div>

                <div id="peopleList" class="people-list"></div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/conf-speakers.js"></script>
</body>
</html>
