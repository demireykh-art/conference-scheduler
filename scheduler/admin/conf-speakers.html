<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/asls-logo.png">
    <title>연자/사회자 관리 · ASLS 행사 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="main-topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div>
                        <h1 class="main-title">연자/사회자 관리</h1>
                        <div id="confName" style="font-size:0.82rem;color:var(--text-dim);margin-top:2px"></div>
                    </div>
                </div>
            </div>
            <div class="main-body">
                <a href="index.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">‹ 행사 목록으로</a>

                <div class="info-banner" style="margin-top:12px">
                    <div class="info-ico">i</div>
                    <div class="info-title">이 행사에 참여하는 연자/사회자 목록. 검색 가능, 없으면 새로 등록 가능.</div>
                </div>

                <div class="ac-wrap" style="max-width:460px;margin-bottom:6px">
                    <input type="text" id="spkInput" placeholder="🔍 연자 이름 입력 후 선택…" autocomplete="off"
                        style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem">
                    <div class="ac-list" id="spkAc"></div>
                </div>
                <div style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px">참여 연자/사회자 <span id="spkCount">0</span>명</div>

                <div class="cs-filterbar">
                    <span class="cs-filter-label">일정 필터</span>
                    <select id="csvDate" onchange="onCsvFilter()"><option value="">전체 날짜</option></select>
                    <input type="text" id="csvSearch" placeholder="🔍 제목/세션 검색" oninput="onCsvFilter()">
                    <select id="csvSort" onchange="onCsvFilter()">
                        <option value="time">시간순</option>
                        <option value="title">제목순</option>
                    </select>
                    <span class="cs-filter-label" style="margin-left:8px">일괄 전송</span>
                    <button class="btn btn-sm btn-primary" title="이메일이 있는 참여자 전원에게 각자의 일정 메일(Gmail 작성창)을 엽니다" onclick="bulkMailSchedule()">📧 전체 일정 메일</button>
                    <button class="btn btn-sm" title="전원 일정을 한 번에 복사(카톡·문서에 붙여넣기)" onclick="bulkCopySchedule()">📋 전체 일정 복사</button>
                </div>

                <div id="peopleList" class="people-list"></div>
            </div>
        </main>
    </div>

    <!-- 새 연자 등록 모달 (연자 관리와 동일) -->
    <div class="modal-overlay" id="spkModal">
        <div class="modal">
            <h3 id="spkModalTitle">새 연자 등록</h3>
            <div class="modal-field">
                <label>사진</label>
                <div style="display:flex;gap:14px;align-items:center">
                    <img id="spkPhotoPreview" class="spk-photo-preview" style="display:none" alt="사진">
                    <div id="spkPhotoEmpty" class="spk-photo-preview spk-photo-empty">사진</div>
                    <div style="display:flex;flex-direction:column;gap:6px">
                        <input type="file" id="spkPhotoFile" accept="image/*" style="display:none">
                        <button type="button" class="btn btn-sm" onclick="document.getElementById('spkPhotoFile').click()">🖼️ 사진 선택</button>
                        <button type="button" class="btn btn-sm btn-danger-ghost" id="spkPhotoClear" onclick="clearSpkPhoto()" style="display:none">✕ 제거</button>
                        <div style="font-size:0.72rem;color:var(--text-dim)">원형으로 표시됩니다 (자동 축소).</div>
                    </div>
                </div>
            </div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>연자 이름 (국문) *</label>
                    <input type="text" id="spkNameKo" placeholder="예: 홍길동">
                </div>
                <div class="modal-field">
                    <label>연자 이름 (영문)</label>
                    <input type="text" id="spkNameEn" placeholder="예: Gil-dong Hong">
                </div>
            </div>
            <div class="modal-grid2">
                <div class="modal-field">
                    <label>소속 (국문)</label>
                    <input type="text" id="spkAffKo" placeholder="예: OO의원">
                </div>
                <div class="modal-field">
                    <label>소속 (영문)</label>
                    <input type="text" id="spkAffEn" placeholder="예: OO Clinic">
                </div>
            </div>
            <div class="modal-field">
                <label>이메일 (CV 요청 메일 발송용)</label>
                <input type="email" id="spkEmail" placeholder="예: speaker@gmail.com">
            </div>
            <div class="modal-field">
                <label>ASLS 관계자 구분</label>
                <div style="display:flex;gap:18px;align-items:center;padding:4px 0">
                    <label class="check-inline"><input type="checkbox" id="spkRoleExec"> ASLS 임원</label>
                    <label class="check-inline"><input type="checkbox" id="spkRoleAdvisor"> ASLS 고문</label>
                    <label class="check-inline"><input type="checkbox" id="spkRoleAmb"> ASLS 엠베서더</label>
                </div>
                <div style="font-size:0.72rem;color:var(--text-dim)">사회자(Moderator)는 ASLS 관계자(임원·고문·엠베서더)만 지정할 수 있습니다.</div>
            </div>
            <div class="modal-field">
                <label>CV / 약력</label>
                <textarea id="spkCv" rows="4" placeholder="학력·경력·주요 이력 등"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeSpeakerModal()">취소</button>
                <button class="btn btn-primary" onclick="saveNewSpeaker()">등록 후 이 행사에 추가</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/version.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/conf-speakers.js"></script>
</body>
</html>
